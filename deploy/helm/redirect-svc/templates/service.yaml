apiVersion: v1
kind: Service
metadata:
  name: {{ include "redirect-svc.fullname" . }}
  labels:
    app: redirect-svc
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}
      protocol: TCP
      name: http
  selector:
    app: redirect-svc
