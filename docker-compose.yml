version: '3.8'

networks:
  urlshortner-net:
    driver: bridge

services:
  # ─────────────────────────────────────────
  # Databases & Cache
  # ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: urlshortner
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/db/postgres/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - urlshortner-net

  redis:
    image: redis:7.2-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - urlshortner-net

  redis-session:
    image: redis:7.2-alpine
    ports:
      - "6380:6379"
    volumes:
      - redis_session_data:/data
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - urlshortner-net

  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    ports:
      - "9000:9000"
      - "8123:8123"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./scripts/db/clickhouse/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - urlshortner-net

  # ─────────────────────────────────────────
  # Message Broker
  # ─────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - urlshortner-net

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - urlshortner-net

  # ─────────────────────────────────────────
  # Auth
  # ─────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:24.0.0
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_DB: dev-mem
    command: start-dev
    ports:
      - "8090:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/ready"]
      interval: 20s
      timeout: 10s
      retries: 10
    networks:
      - urlshortner-net

  # ─────────────────────────────────────────
  # Workflow Engine
  # ─────────────────────────────────────────
  temporal:
    image: temporalio/auto-setup:1.24.2
    depends_on:
      - postgres
    environment:
      DB: postgresql
      DB_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PWD: postgres
      POSTGRES_SEEDS: postgres
      DYNAMIC_CONFIG_FILE_PATH: config/dynamicconfig/development-sql.yaml
    ports:
      - "7233:7233"
    networks:
      - urlshortner-net

  temporal-ui:
    image: temporalio/ui:2.26.2
    depends_on:
      - temporal
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:3000
    ports:
      - "8088:8080"
    networks:
      - urlshortner-net

  # ─────────────────────────────────────────
  # Application Services
  # ─────────────────────────────────────────
  redirect-svc:
    build:
      context: ./services/redirect-svc
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - urlshortner-net
    restart: on-failure

  url-api-svc:
    build:
      context: ./services/url-api-svc
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - urlshortner-net
    restart: on-failure

  analytics-ingest-svc:
    build:
      context: ./services/analytics-ingest-svc
      dockerfile: Dockerfile
    ports:
      - "8082:8082"
    env_file: .env
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - urlshortner-net
    restart: on-failure

  analytics-query-svc:
    build:
      context: ./services/analytics-query-svc
      dockerfile: Dockerfile
    ports:
      - "8083:8083"
    env_file: .env
    depends_on:
      clickhouse:
        condition: service_healthy
    networks:
      - urlshortner-net
    restart: on-failure

  user-org-svc:
    build:
      context: ./services/user-org-svc
      dockerfile: Dockerfile
    ports:
      - "8084:8084"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - urlshortner-net
    restart: on-failure

  qr-svc:
    build:
      context: ./services/qr-svc
      dockerfile: Dockerfile
    ports:
      - "8085:8085"
    env_file: .env
    networks:
      - urlshortner-net
    restart: on-failure

  notification-svc:
    build:
      context: ./services/notification-svc
      dockerfile: Dockerfile
    ports:
      - "8086:8086"
    env_file: .env
    networks:
      - urlshortner-net
    restart: on-failure

  admin-svc:
    build:
      context: ./services/admin-svc
      dockerfile: Dockerfile
    ports:
      - "8087:8087"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - urlshortner-net
    restart: on-failure

volumes:
  postgres_data:
  redis_data:
  redis_session_data:
  clickhouse_data:
