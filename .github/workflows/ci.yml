name: CI – Build, Test, Lint, Scan

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

env:
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
  GO_VERSION: '1.22'
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.11'

jobs:
  # ─── Go Services ─────────────────────────────────────────────────────────────
  go-ci:
    name: Go – Lint, Test, Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [redirect-svc, url-api-svc, analytics-ingest-svc]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: services/${{ matrix.service }}/go.sum

      - name: Lint (${{ matrix.service }})
        uses: golangci/golangci-lint-action@v5
        with:
          working-directory: services/${{ matrix.service }}
          version: latest

      - name: Test (${{ matrix.service }})
        run: |
          cd services/${{ matrix.service }}
          go test ./... -race -coverprofile=coverage.out -covermode=atomic
        continue-on-error: false

      - name: Build (${{ matrix.service }})
        run: |
          cd services/${{ matrix.service }}
          go build -ldflags="-s -w" ./...

  # ─── Node.js Services ─────────────────────────────────────────────────────────
  node-ci:
    name: Node – Lint, Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [analytics-query-svc, user-org-svc, notification-svc, admin-svc]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: services/${{ matrix.service }}/package-lock.json

      - name: Install (${{ matrix.service }})
        run: cd services/${{ matrix.service }} && npm ci --prefer-offline

      - name: Test (${{ matrix.service }})
        run: cd services/${{ matrix.service }} && npm test
        continue-on-error: true  # tests are stubs in early phases

  # ─── Python Service ────────────────────────────────────────────────────────────
  python-ci:
    name: Python – Lint, Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: services/qr-svc/requirements.txt

      - name: Install qr-svc
        run: cd services/qr-svc && pip install -r requirements.txt

      - name: Lint (flake8)
        run: cd services/qr-svc && pip install flake8 && flake8 app/ --max-line-length=120
        continue-on-error: true

      - name: Test
        run: |
          cd services/qr-svc
          pip install pytest
          python -m pytest tests/ -v 2>/dev/null || echo "No tests yet"

  # ─── Docker Build & Trivy Security Scan ───────────────────────────────────────
  docker-build-scan:
    name: Docker – Build & Trivy Scan
    runs-on: ubuntu-latest
    needs: [go-ci, node-ci, python-ci]
    if: github.ref == 'refs/heads/main'
    strategy:
      matrix:
        service:
          - redirect-svc
          - url-api-svc
          - analytics-ingest-svc
          - analytics-query-svc
          - user-org-svc
          - notification-svc
          - admin-svc
          - qr-svc
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (${{ matrix.service }})
        uses: docker/build-push-action@v5
        with:
          context: services/${{ matrix.service }}
          push: false
          tags: urlshortner/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy vulnerability scan (${{ matrix.service }})
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: urlshortner/${{ matrix.service }}:${{ github.sha }}
          format: table
          exit-code: '1'
          severity: CRITICAL

  # ─── Push to ECR (main branch only) ───────────────────────────────────────────
  ecr-push:
    name: Push to Amazon ECR
    runs-on: ubuntu-latest
    needs: docker-build-scan
    if: github.ref == 'refs/heads/main'
    permissions:
      id-token: write
      contents: read
    strategy:
      matrix:
        service:
          - redirect-svc
          - url-api-svc
          - analytics-ingest-svc
          - analytics-query-svc
          - user-org-svc
          - notification-svc
          - admin-svc
          - qr-svc
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_IAM_ROLE_ARN }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag & push (${{ matrix.service }})
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          IMAGE=$REGISTRY/urlshortner/${{ matrix.service }}
          docker build -t $IMAGE:${{ github.sha }} -t $IMAGE:latest services/${{ matrix.service }}
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:latest
