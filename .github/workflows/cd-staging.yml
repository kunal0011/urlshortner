name: CD – Deploy to Staging

on:
  workflow_run:
    workflows: ["CI – Build, Test, Lint, Scan"]
    types: [completed]
    branches: [main]

jobs:
  deploy-staging:
    name: Deploy to Staging (ArgoCD sync)
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_IAM_ROLE_ARN }}
          aws-region: us-east-1

      - name: Install ArgoCD CLI
        run: |
          curl -sSL -o argocd https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          chmod +x argocd && sudo mv argocd /usr/local/bin/

      - name: ArgoCD login
        run: |
          argocd login ${{ secrets.ARGOCD_SERVER }} \
            --username admin \
            --password ${{ secrets.ARGOCD_PASSWORD }} \
            --insecure

      - name: Sync all services to staging
        run: |
          SERVICES="redirect-svc url-api-svc analytics-ingest-svc analytics-query-svc user-org-svc qr-svc notification-svc admin-svc"
          for svc in $SERVICES; do
            echo "Syncing $svc to staging..."
            argocd app sync urlshortner-staging-$svc --timeout 120 || true
            argocd app wait urlshortner-staging-$svc --health --timeout 120
          done

      - name: Run smoke tests (Checkly)
        env:
          CHECKLY_API_KEY: ${{ secrets.CHECKLY_API_KEY }}
          CHECKLY_ACCOUNT_ID: ${{ secrets.CHECKLY_ACCOUNT_ID }}
        run: |
          curl -f -X POST \
            "https://api.checklyhq.com/v1/triggers/staging" \
            -H "Authorization: Bearer $CHECKLY_API_KEY" \
            -H "X-Checkly-Account: $CHECKLY_ACCOUNT_ID" || echo "Smoke test trigger failed"
