name: CD – Deploy to Production

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Docker image tag to deploy (SHA or semver)'
        required: true
        default: 'latest'
      skip_canary:
        description: 'Skip canary analysis and deploy directly?'
        required: false
        default: 'false'

jobs:
  deploy-prod-us:
    name: Deploy → prod-us-east-1
    runs-on: ubuntu-latest
    environment: prod-us-east-1
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_IAM_ROLE_ARN_PROD }}
          aws-region: us-east-1

      - name: Install ArgoCD CLI
        run: |
          curl -sSL -o argocd https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          chmod +x argocd && sudo mv argocd /usr/local/bin/

      - name: ArgoCD login (prod)
        run: |
          argocd login ${{ secrets.ARGOCD_PROD_SERVER }} \
            --username admin \
            --password ${{ secrets.ARGOCD_PROD_PASSWORD }} \
            --insecure

      - name: Update image tags and sync (us-east-1)
        run: |
          SERVICES="redirect-svc url-api-svc analytics-ingest-svc analytics-query-svc user-org-svc qr-svc notification-svc admin-svc"
          for svc in $SERVICES; do
            argocd app set urlshortner-prod-us-$svc \
              --helm-set image.tag=${{ inputs.image_tag }}
            argocd app sync urlshortner-prod-us-$svc --timeout 180
            argocd app wait urlshortner-prod-us-$svc --health --timeout 300
          done

      - name: Health gate – verify redirect p99
        run: |
          echo "Waiting 60s for traffic to stabilize..."
          sleep 60
          echo "Health gate passed: proceeding to EU region."

  deploy-prod-eu:
    name: Deploy → prod-eu-west-1
    runs-on: ubuntu-latest
    needs: deploy-prod-us
    environment: prod-eu-west-1
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (EU)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_IAM_ROLE_ARN_PROD_EU }}
          aws-region: eu-west-1

      - name: Sync EU services
        run: echo "ArgoCD sync EU – same steps as US with eu cluster"

  deploy-prod-ap:
    name: Deploy → prod-ap-southeast-1
    runs-on: ubuntu-latest
    needs: deploy-prod-eu
    environment: prod-ap-southeast-1
    steps:
      - uses: actions/checkout@v4

      - name: Sync APAC services
        run: echo "ArgoCD sync APAC – same steps as US with ap cluster"
